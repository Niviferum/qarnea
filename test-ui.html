<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Qarnea — Test Auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 2rem; }
    h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; margin-bottom: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
      max-width: 1000px;
    }

    .card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 1.25rem;
    }

    label { display: block; font-size: 0.8rem; color: #52525b; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    label:first-of-type { margin-top: 0; }

    input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #d4d4d8;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.5rem;
      background: #18181b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #3f3f46; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }

    .response {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #f4f4f5;
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .response.ok { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .response.err { background: #fef2f2; border: 1px solid #fecaca; }

    .token-box {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      max-width: 1000px;
    }
    .token-value {
      font-family: monospace;
      font-size: 0.7rem;
      word-break: break-all;
      color: #3b82f6;
      margin-top: 0.25rem;
    }
    .token-empty { color: #a1a1aa; font-style: italic; font-size: 0.8rem; }
  </style>
</head>
<body>

<h1>Qarnea — Test interface auth</h1>

<div class="token-box">
  <h2>Session courante</h2>
  <label>Access token</label>
  <div id="display-access" class="token-empty">aucun</div>
  <label>Refresh token</label>
  <div id="display-refresh" class="token-empty">aucun</div>
</div>

<div class="grid">

  <div class="card">
    <h2>Inscription</h2>
    <label>Email</label>
    <input id="reg-email" type="email" value="test@qarnea.fr">
    <label>Mot de passe</label>
    <input id="reg-password" type="password" value="motdepasse123">
    <label>Nom</label>
    <input id="reg-nom" value="Dupont">
    <label>Prenom</label>
    <input id="reg-prenom" value="Jean">
    <label>Telephone (optionnel)</label>
    <input id="reg-telephone" value="">
    <button onclick="register()">S'inscrire</button>
    <div id="reg-response" class="response"></div>
  </div>

  <div class="card">
    <h2>Connexion</h2>
    <label>Email</label>
    <input id="login-email" type="email" value="test@qarnea.fr">
    <label>Mot de passe</label>
    <input id="login-password" type="password" value="motdepasse123">
    <button onclick="login()">Se connecter</button>
    <div id="login-response" class="response"></div>
  </div>

  <div class="card">
    <h2>Refresh token</h2>
    <p style="font-size:0.8rem;color:#71717a">Utilise le refresh token de la session courante.</p>
    <button class="secondary" onclick="refresh()">Renouveler les tokens</button>
    <div id="refresh-response" class="response"></div>
  </div>

  <div class="card">
    <h2>Deconnexion</h2>
    <p style="font-size:0.8rem;color:#71717a">Invalide le refresh token en Redis. Necessite d'etre connecte.</p>
    <button class="danger" onclick="logout()">Se deconnecter</button>
    <div id="logout-response" class="response"></div>
  </div>

</div>

<script>
  const API = 'http://localhost:3001';
  let accessToken = null;
  let refreshToken = null;

  function setTokens(access, refresh) {
    accessToken = access;
    refreshToken = refresh;
    const accessEl = document.getElementById('display-access');
    const refreshEl = document.getElementById('display-refresh');
    if (access) {
      accessEl.className = 'token-value';
      accessEl.textContent = access;
    } else {
      accessEl.className = 'token-empty';
      accessEl.textContent = 'aucun';
    }
    if (refresh) {
      refreshEl.className = 'token-value';
      refreshEl.textContent = refresh;
    } else {
      refreshEl.className = 'token-empty';
      refreshEl.textContent = 'aucun';
    }
  }

  function showResponse(id, data, ok) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    el.className = 'response ' + (ok ? 'ok' : 'err');
    el.textContent = JSON.stringify(data, null, 2);
  }

  async function call(method, path, body, token) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { json = text; }
    return { ok: res.ok, status: res.status, data: json };
  }

  async function register() {
    const body = {
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
      nom: document.getElementById('reg-nom').value,
      prenom: document.getElementById('reg-prenom').value,
    };
    const tel = document.getElementById('reg-telephone').value;
    if (tel) body.telephone = tel;
    const res = await call('POST', '/auth/register', body);
    showResponse('reg-response', res.data, res.ok);
    if (res.ok) setTokens(res.data.access_token, res.data.refresh_token);
  }

  async function login() {
    const body = {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    };
    const res = await call('POST', '/auth/login', body);
    showResponse('login-response', res.data, res.ok);
    if (res.ok) setTokens(res.data.access_token, res.data.refresh_token);
  }

  async function refresh() {
    if (!refreshToken) {
      showResponse('refresh-response', { message: 'Aucun refresh token en session' }, false);
      return;
    }
    const res = await call('POST', '/auth/refresh', { refresh_token: refreshToken });
    showResponse('refresh-response', res.data, res.ok);
    if (res.ok) setTokens(res.data.access_token, res.data.refresh_token);
  }

  async function logout() {
    if (!accessToken) {
      showResponse('logout-response', { message: 'Aucun access token en session' }, false);
      return;
    }
    const res = await call('POST', '/auth/logout', null, accessToken);
    showResponse('logout-response', res.status === 204 ? { message: 'Deconnecte' } : res.data, res.ok || res.status === 204);
    if (res.status === 204) setTokens(null, null);
  }
</script>

</body>
</html>
