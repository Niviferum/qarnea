name: build-and-push

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/app?schema=public
      DISABLE_ERD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create temporary env file for Prisma and Docker build
        run: |
          echo 'DATABASE_URL="postgresql://user:password@localhost:5432/app?schema=public"' > backend/.env
          echo 'DISABLE_ERD="true"' >> backend/.env
          echo "backend/.env created for Prisma"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run tests
        working-directory: ./backend
        run: npm test

      - name: Set lowercase image name
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> $GITHUB_ENV
          echo "Resolved image: ghcr.io/${OWNER_LC}/${REPO_LC}:latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            DATABASE_URL=postgresql://user:password@localhost:5432/app?schema=public
            DISABLE_ERD=true
