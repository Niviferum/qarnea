name: build-and-push

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create temporary env file for Prisma build
        run: |
          echo 'DATABASE_URL="postgresql://user:password@localhost:5432/app?schema=public"' > .env
          echo ".env created for Docker build"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Si les tests échouent à cause de la DB, commente cette étape
      - name: Run tests
        run: npm test

      - name: Set lowercase image name
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> $GITHUB_ENV
          echo "Resolved image: ghcr.io/${OWNER_LC}/${REPO_LC}:latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
